# .github/workflows/scan.yml — SCAN GIORNALIERO
# Trigger: cron-job.org (workflow_dispatch), come il monitor OI.
name: Daily Scan

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Run scan
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
          COINALYZE_API_KEY: ${{ secrets.COINALYZE_API_KEY }}
        run: python scan.py

      - name: Commit state
        run: |
          git config user.name "scan-bot"
          git config user.email "scan-bot@users.noreply.github.com"
          git add scan_state.json
          git diff --cached --quiet || git commit -m "update scan state [skip ci]"
          git push
